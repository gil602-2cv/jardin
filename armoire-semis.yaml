                  width: 700
                  height: 100
                  styles: style_card
                  widgets:

                    - label:
                        id: lbl_time
                        text: "00:00"
                        styles: style_value
                        align: left_mid
                        x: 20

                    - label:
                        id: lbl_nameday
                        text: "Chargement..."
                        text_font: font_text
                        text_color: 0x90A4AE
                        align: left_mid
                        x: 240

                    - label:
                        text: "\ue63e"
                        text_font: font_icon
                        text_color: 0x4682B4
                        align: right_mid
                        x: -20

              # Bloc Température
              - obj:
                  x: 10
                  y: 120
                  width: 340
                  height: 340
                  styles: style_card
                  widgets:

                    - label:
                        text: "TEMPERATURE"
