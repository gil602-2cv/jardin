script:
  - id: update_nameday
    then:
      - http_request.get:
          url: "https://nameday.abalin.net/api/V2/today?country=fr"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body);
                  if (err) {
                    ESP_LOGW("nameday", "JSON error: %s", err.c_str());
                    return;
                  }
                  if (!doc["namedays"]["fr"].isNull()) {
                    std::string name = doc["namedays"]["fr"].as<std::string>();
                    if (!name.empty()) {
                      lv_label_set_text(id(lbl_nameday), ("St " + name).c_str());
                    }
                  }

# ─────────────────────────────────────────────────────────────
# LVGL UI — Style industriel 800x480
#
# Layout :
#   [Sidebar 80px | icônes nav] [Zone principale 720px]
#
# Onglet 0 : Serre  — horloge + temp + humidité
# Onglet 1 : Semis  — lecteur NFC
# Onglet 2 : Arrosage — 4 zones pilotées via HA
#
# Navigation : obj clickable dans la sidebar
# Switching  : lvgl.tabview.select avec index (syntaxe v2026)
# lvgl.widget.update pour highlight actif/inactif
# ─────────────────────────────────────────────────────────────

lvgl:

  displays:
    - main_display

  bg_color: 0x101010

  style_definitions:

    - id: style_card
      bg_color: 0x121212
      border_color: 0x4682B4
      border_width: 2
      radius: 4
      pad_all: 10

    - id: style_value
      text_font: font_clock
      text_color: 0x00FF41

    - id: style_section
      text_font: font_small
      text_color: 0x4682B4

  widgets:

    # ══════════════════════════
    # SIDEBAR — 80x480 px
    # ══════════════════════════
    - obj:
        x: 0
        y: 0
        width: 80
        height: 480
        bg_color: 0x0D0D0D
        border_color: 0x4682B4
        border_width: 1
        radius: 0
        pad_all: 0

        widgets:

          - label:
              text: "\ue88e"
              text_font: font_icon
              text_color: 0x37474F
              align: top_mid
              y: 10

          # Bouton Serre — actif par défaut
          - obj:
              id: nav_serre
              x: 0
              y: 60
              width: 80
              height: 80
              clickable: true
              bg_color: 0x1A2744
              border_width: 0
              radius: 0
              pad_all: 0
              on_click:
                then:
                  - lvgl.tabview.select:
                      id: main_tabs
                      index: 0
                  - lvgl.widget.update:
                      id: nav_serre
                      bg_color: 0x1A2744
                  - lvgl.widget.update:
                      id: nav_semis
                      bg_color: 0x0D0D0D
                  - lvgl.widget.update:
                      id: nav_arrosage
                      bg_color: 0x0D0D0D
              widgets:
                - label:
                    text: "\ue916"
                    text_font: font_icon
                    text_color: 0x4FC3F7
                    align: center
                    y: -12
                - label:
                    text: "Serre"
                    text_font: font_small
                    text_color: 0x4FC3F7
                    align: center
                    y: 22

          # Bouton Semis — inactif par défaut
          - obj:
              id: nav_semis
              x: 0
              y: 145
              width: 80
              height: 80
              clickable: true
              bg_color: 0x0D0D0D
              border_width: 0
              radius: 0
              pad_all: 0
              on_click:
                then:
                  - lvgl.tabview.select:
                      id: main_tabs
                      index: 1
                  - lvgl.widget.update:
                      id: nav_semis
                      bg_color: 0x1A2744
                  - lvgl.widget.update:
                      id: nav_serre
                      bg_color: 0x0D0D0D
                  - lvgl.widget.update:
                      id: nav_arrosage
                      bg_color: 0x0D0D0D
              widgets:
                - label:
                    text: "\ue3a6"
                    text_font: font_icon
                    text_color: 0x546E7A
                    align: center
                    y: -12
                - label:
                    text: "Semis"
                    text_font: font_small
                    text_color: 0x546E7A
                    align: center
                    y: 22


          # Bouton Arrosage — inactif par défaut
          - obj:
              id: nav_arrosage
              x: 0
              y: 230
              width: 80
              height: 80
              clickable: true
              bg_color: 0x0D0D0D
              border_width: 0
              radius: 0
              pad_all: 0
              on_click:
                then:
                  - lvgl.tabview.select:
                      id: main_tabs
                      index: 2
                  - lvgl.widget.update:
                      id: nav_arrosage
                      bg_color: 0x1A2744
                  - lvgl.widget.update:
                      id: nav_serre
                      bg_color: 0x0D0D0D
                  - lvgl.widget.update:
                      id: nav_semis
                      bg_color: 0x0D0D0D
              widgets:
                - label:
                    text: "\ueb3b"
                    text_font: font_icon
                    text_color: 0x546E7A
                    align: center
                    y: -12
                - label:
                    text: "Eau"
                    text_font: font_small
                    text_color: 0x546E7A
                    align: center
                    y: 22

          # Icône Wi-Fi bas de sidebar
          - label:
              text: "\ue63e"
              text_font: font_icon
              text_color: 0x4682B4
              align: bottom_mid
              y: -15

    # ══════════════════════════
    # TABVIEW — 720x480 px
    # ══════════════════════════
    - tabview:
        id: main_tabs
        x: 80
        y: 0
        width: 720
        height: 480

        tabs:

          # ──────────────────
          # ONGLET 0 — SERRE
          # ──────────────────
          - name: "Serre"
            widgets:

              # Header horloge + saint du jour
              - obj:
                  x: 10
