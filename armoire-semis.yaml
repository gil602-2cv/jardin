substitutions:
  device_name: armoire-semis
  friendly_name: "Armoire Semis Pro"
  api_encryption_key: "MMURdF0sL6kRkmRyBkeVOQ/c889Mt7hIORi8Lv33gkI="
  ota_password_clear: "548fc2a8712b3c4aaaec769efdabe89d"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - switch.turn_on: back_light
      - script.execute: update_nameday

esp32:
  board: esp32s3box
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password_clear}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

logger:

# ─────────────────────────
# HTTP
# ─────────────────────────

http_request:
  verify_ssl: false

# ─────────────────────────
# I2C + CH422G
# ─────────────────────────

i2c:
  sda: GPIO08
  scl: GPIO09

ch422g:
  - id: ch422g_hub

# ─────────────────────────
# BACKLIGHT — CH422G pin 2
# Sur l'ESP32-S3-Touch-LCD-7, le rétroéclairage est câblé sur le
# CH422G (IO expander I2C), pin 2. Ce chip ne supporte PAS le PWM :
# le contrôle est uniquement ON/OFF.
# Exposé comme switch dans HA pour allumer/éteindre l'écran.
# ─────────────────────────

switch:
  - platform: gpio
    id: back_light
    name: "Retroeclairage"
    pin:
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
      inverted: false
    restore_mode: ALWAYS_ON

# ─────────────────────────
# TIME
# ─────────────────────────

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_time
              text: !lambda 'return id(sntp_time).now().strftime("%H:%M");'
      - hours: 0
        minutes: 0
        seconds: 2
        then:
          - script.execute: update_nameday

# ─────────────────────────
# DISPLAY — timings Waveshare 7" 800x480
# ─────────────────────────

display:
  - platform: mipi_rgb
    id: main_display
    model: ESP32-S3-TOUCH-LCD-7-800X480

    dimensions:
      width: 800
      height: 480

    hsync_pulse_width: 10
    hsync_back_porch: 20
    hsync_front_porch: 10

    vsync_pulse_width: 10
    vsync_back_porch: 10
    vsync_front_porch: 10

    pclk_frequency: 16MHz

    reset_pin: { ch422g: ch422g_hub, number: 3 }

# ─────────────────────────
# TOUCHSCREEN
# ─────────────────────────

touchscreen:
  - platform: gt911
    interrupt_pin: GPIO4
    reset_pin: { ch422g: ch422g_hub, number: 1 }

# ─────────────────────────
# FONTS
# ─────────────────────────

font:

  - file: "gfonts://Bebas Neue"
    id: font_clock
    size: 72
    glyphs: "0123456789:.°%- C"

  - file: "gfonts://Montserrat"
    id: font_text
    size: 24
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzàâäéèêëîïôùûüç0123456789 .,:;!?-_%°/'+"

  - file: "gfonts://Montserrat"
    id: font_small
    size: 16
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzàâäéèêëîïôùûüç0123456789 .,:;!?-_%°/'+"

  - file: "gfonts://Material Symbols Outlined"
    id: font_icon
    size: 36
    ignore_missing_glyphs: true
    glyphs:
      - "\ue88e"
      - "\ue63e"
      - "\ue816"
      - "\ue1ff"
      - "\ue3a6"
      - "\ue916"
