      - "\ue766"   # schedule
      - "\ue8b8"   # timer

# ─────────────────────────
# BLE SENSOR
# ─────────────────────────

esp32_ble_tracker:

sensor:

  - platform: atc_mithermometer
    mac_address: "A4:C1:38:C9:4F:A6"

    temperature:
      id: temp_val
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_temp
              text: !lambda 'return str_sprintf("%.1f°C", x);'

    humidity:
      id: hum_val
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_hum
              text: !lambda 'return str_sprintf("%.0f%%", x);'

# ─────────────────────────
# SAINT DU JOUR
# ArduinoJson v7 : JsonDocument (plus de DynamicJsonDocument)
# ─────────────────────────

  # ── Smart Irrigation (HASmartIrrigation v2025) ──
  # Durées calculées par zone (secondes → converties en minutes à l'affichage)
  # entity_id à adapter selon vos noms de zones dans Smart Irrigation
  - platform: homeassistant
    id: si_zone1_duree
    entity_id: sensor.smart_irrigation_potager
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_z1_duree
            text: !lambda |-
              int min = (int)(x / 60);
              if (min <= 0) return std::string("Pas d'arrosage");
              return std::to_string(min) + " min";

